<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>妃那的櫻花跳躍</title>
  <style>
    :root {
      --ink: #3d284c;
      --panel: rgba(255, 250, 252, 0.84);
      --panel-strong: rgba(255, 255, 255, 0.95);
      --pink: #f06f9f;
      --violet: #6746b7;
      --gold: #e6b64a;
      --sky: #8ec8f3;
      --mint: #75c9a0;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #9dd0f3;
      color: var(--ink);
      font-family: "Trebuchet MS", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    }

    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background: var(--sky);
    }

    .hud {
      position: fixed;
      inset: env(safe-area-inset-top) 0 auto 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px clamp(12px, 4vw, 24px);
      pointer-events: none;
      z-index: 2;
    }

    .score,
    .badge {
      min-width: 82px;
      border: 2px solid rgba(82, 48, 117, 0.18);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 22px rgba(94, 46, 91, 0.14);
      padding: 8px 10px;
      backdrop-filter: blur(8px);
    }

    .score strong,
    .badge strong {
      display: block;
      font-size: 12px;
      letter-spacing: 0;
      color: #7d4c92;
      line-height: 1;
      margin-bottom: 4px;
    }

    .score span,
    .badge span {
      display: block;
      font-weight: 900;
      font-size: clamp(20px, 6vw, 30px);
      line-height: 1;
    }

    .touchHint {
      position: fixed;
      inset: auto 0 calc(env(safe-area-inset-bottom) + 16px) 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 clamp(12px, 4vw, 22px);
      z-index: 2;
      pointer-events: none;
    }

    .touchHint div {
      height: 46px;
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.34);
      color: rgba(61, 40, 76, 0.78);
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 900;
      box-shadow: inset 0 0 0 1px rgba(103, 70, 183, 0.08);
      backdrop-filter: blur(4px);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      z-index: 3;
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0) 42%),
        rgba(103, 70, 183, 0.10);
    }

    .card {
      width: min(420px, 92vw);
      border: 2px solid rgba(103, 70, 183, 0.22);
      border-radius: 8px;
      background: var(--panel-strong);
      box-shadow: 0 20px 50px rgba(74, 44, 92, 0.22);
      padding: 22px;
      text-align: center;
    }

    h1 {
      margin: 2px 0 8px;
      font-size: clamp(32px, 10vw, 48px);
      line-height: 1.02;
      letter-spacing: 0;
      color: var(--violet);
    }

    .subtitle {
      margin: 0 0 18px;
      color: #6e5279;
      font-weight: 700;
      line-height: 1.55;
    }

    .fanNote {
      display: inline-block;
      margin: 0 0 12px;
      border: 1px solid rgba(103, 70, 183, 0.18);
      border-radius: 8px;
      background: rgba(255, 247, 252, 0.78);
      color: #6f4c9e;
      padding: 5px 9px;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.25;
    }

    .heroStamp {
      margin: 0 auto 14px;
      width: 118px;
      height: 118px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: url("assets/fina-stand.png") center 12% / 150% auto no-repeat;
      box-shadow: 0 10px 26px rgba(240, 111, 159, 0.26);
      position: relative;
    }

    .heroStamp::before {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.72);
    }

    .heroStamp::after {
      content: none;
    }

    button {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #7e58d6, #5933a8);
      color: #fff;
      font: inherit;
      font-weight: 900;
      box-shadow: 0 8px 0 #3d237c, 0 14px 24px rgba(89, 51, 168, 0.28);
      cursor: pointer;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #3d237c, 0 8px 14px rgba(89, 51, 168, 0.24);
    }

    .small {
      margin: 14px 0 0;
      font-size: 13px;
      color: #7b6586;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }

    @media (min-width: 760px) {
      body {
        display: grid;
        place-items: center;
        background:
          linear-gradient(90deg, rgba(255, 210, 226, 0.34), rgba(141, 206, 243, 0.34)),
          #eaf7ff;
      }

      #game {
        width: min(100vw, 460px);
        height: 100vh;
        box-shadow: 0 0 0 1px rgba(65, 41, 88, 0.18), 0 22px 70px rgba(65, 41, 88, 0.2);
      }

      .hud,
      .touchHint {
        left: 50%;
        width: min(100vw, 460px);
        transform: translateX(-50%);
      }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="妃那的櫻花跳躍遊戲"></canvas>
  <div class="hud">
    <div class="score"><strong>高度</strong><span id="score">0</span></div>
    <div class="badge"><strong>星星</strong><span id="stars">0</span></div>
  </div>
  <div class="touchHint">
    <div>踩台階後跳左</div>
    <div>踩台階後跳右</div>
  </div>
  <div class="overlay" id="overlay">
    <div class="card">
      <div class="heroStamp" aria-hidden="true"></div>
      <h1>妃那的櫻花跳躍</h1>
      <div class="fanNote">符文工廠：龍之天地 同人小游戲</div>
      <p class="subtitle">點左邊向左跳，點右邊向右跳。踩上櫻花台階，收集金色星星，越跳越高。</p>
      <button id="startButton">開始冒險</button>
      <p class="small">電腦也能玩：按 A / ← 跳左，D / → 跳右。</p>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const starsEl = document.getElementById("stars");
      const overlay = document.getElementById("overlay");
      const startButton = document.getElementById("startButton");
      const finaStand = new Image();
      let finaStandCanvas = null;
      finaStand.src = "assets/fina-stand.png";
      finaStand.onload = () => {
        finaStandCanvas = makeLightBackgroundTransparent(finaStand);
      };

      const state = {
        width: 0,
        height: 0,
        scale: 1,
        running: false,
        over: false,
        cameraY: 0,
        score: 0,
        stars: 0,
        bestY: 0,
        startY: 0,
        platforms: [],
        petals: [],
        sparkles: [],
        player: null,
        lastTime: 0
      };

      const rand = (min, max) => Math.random() * (max - min) + min;
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

      function resize() {
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        state.width = rect.width;
        state.height = rect.height;
        state.scale = clamp(rect.width / 390, 0.82, 1.18);
      }

      function makePlatform(y, type = "normal") {
        const w = rand(98, 136) * state.scale;
        return {
          x: rand(18, Math.max(22, state.width - w - 18)),
          y,
          w,
          h: 16 * state.scale,
          type,
          drift: type === "cloud" ? rand(0.7, 1.25) * (Math.random() < 0.5 ? -1 : 1) : 0,
          phase: rand(0, Math.PI * 2),
          star: Math.random() < 0.34,
          used: false,
          breakTimer: 0
        };
      }

      function resetGame() {
        resize();
        state.cameraY = 0;
        state.score = 0;
        state.stars = 0;
        state.over = false;
        state.running = true;
        state.platforms = [];
        state.petals = [];
        state.sparkles = [];
        const baseY = state.height - 78;
        state.bestY = baseY - 60;
        state.startY = baseY - 60;
        state.platforms.push({ x: state.width / 2 - 66, y: baseY, w: 132, h: 18, type: "start", drift: 0, phase: 0, star: false, used: false, breakTimer: 0 });
        for (let y = baseY - 68; y > -state.height * 1.9; y -= rand(54, 72)) {
          const chance = Math.random();
          state.platforms.push(makePlatform(y, chance < 0.12 ? "break" : chance < 0.3 ? "cloud" : "normal"));
        }
        for (let i = 0; i < 46; i += 1) {
          state.petals.push({ x: rand(0, state.width), y: rand(-state.height, state.height), r: rand(4, 9), s: rand(18, 52), a: rand(0, Math.PI * 2) });
        }
        state.player = {
          x: state.width / 2,
          y: baseY - 60,
          vx: 0,
          vy: -7.2,
          w: 52 * state.scale,
          h: 70 * state.scale,
          face: 1,
          squash: 0,
          canJump: true,
          queuedDirection: 0,
          invuln: 0
        };
        scoreEl.textContent = "0";
        starsEl.textContent = "0";
      }

      function screenY(worldY) {
        return worldY - state.cameraY;
      }

      function jump(direction) {
        if (!state.running || state.over) {
          resetGame();
          overlay.classList.add("hidden");
        }
        const p = state.player;
        if (!p.canJump) {
          p.queuedDirection = direction;
          return;
        }
        applyDirectedJump(p, direction);
      }

      function applyDirectedJump(p, direction) {
        p.canJump = false;
        p.queuedDirection = 0;
        p.vx = direction * 3.75 * state.scale;
        p.vy = -9.45 * state.scale;
        p.face = direction;
        p.squash = 1;
        burst(p.x, p.y + p.h * 0.48, "#fff4b8", 8);
      }

      function burst(x, y, color, count) {
        for (let i = 0; i < count; i += 1) {
          state.sparkles.push({
            x,
            y,
            vx: rand(-2.2, 2.2),
            vy: rand(-3.2, -0.4),
            life: rand(22, 38),
            color,
            size: rand(2, 5)
          });
        }
      }

      function ensurePlatforms() {
        let top = Math.min(...state.platforms.map((p) => p.y));
        while (top > state.cameraY - state.height * 1.7) {
          top -= rand(54, 72);
          const chance = Math.random();
          state.platforms.push(makePlatform(top, chance < 0.12 ? "break" : chance < 0.24 ? "spring" : chance < 0.4 ? "cloud" : "normal"));
        }
        state.platforms = state.platforms.filter((p) => p.y < state.cameraY + state.height + 90 && p.breakTimer < 28);
      }

      function update(dt) {
        const p = state.player;
        const gravity = 0.38 * state.scale;
        p.vy += gravity * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= Math.pow(0.986, dt);
        p.squash = Math.max(0, p.squash - 0.06 * dt);
        p.invuln = Math.max(0, p.invuln - dt);

        const leftWall = p.w * 0.38;
        const rightWall = state.width - p.w * 0.38;
        if (p.x < leftWall) {
          p.x = leftWall;
          p.vx = Math.abs(p.vx) * 0.42;
          p.face = 1;
        }
        if (p.x > rightWall) {
          p.x = rightWall;
          p.vx = -Math.abs(p.vx) * 0.42;
          p.face = -1;
        }

        for (const platform of state.platforms) {
          platform.phase += 0.02 * dt;
          if (platform.drift) {
            platform.x += platform.drift * dt;
            if (platform.x < 12 || platform.x + platform.w > state.width - 12) platform.drift *= -1;
          }
          if (platform.breakTimer > 0) platform.breakTimer += dt;

          const wasAbove = p.y + p.h * 0.48 - p.vy * dt <= platform.y;
          const nowCrossing = p.y + p.h * 0.48 >= platform.y && p.y + p.h * 0.38 <= platform.y + platform.h;
          const magnet = 18 * state.scale;
          const playerLeft = p.x - p.w * 0.32;
          const playerRight = p.x + p.w * 0.32;
          const horizontal = playerRight > platform.x - magnet && playerLeft < platform.x + platform.w + magnet;
          if (p.vy > 0 && wasAbove && nowCrossing && horizontal) {
            if (p.x < platform.x) p.x += (platform.x - p.x) * 0.45;
            if (p.x > platform.x + platform.w) p.x -= (p.x - (platform.x + platform.w)) * 0.45;
            p.y = platform.y - p.h * 0.48;
            p.vy = platform.type === "spring" ? -11.6 * state.scale : -9.2 * state.scale;
            p.canJump = true;
            p.squash = 1;
            burst(p.x, platform.y, platform.type === "spring" ? "#ffe46f" : "#fff6ff", platform.type === "spring" ? 14 : 7);
            if (platform.type === "break" && platform.breakTimer === 0) {
              platform.breakTimer = 1;
              platform.star = false;
              burst(platform.x + platform.w / 2, platform.y, "#f0b6ca", 12);
            }
            if (p.queuedDirection) applyDirectedJump(p, p.queuedDirection);
          }

          if (platform.star) {
            const sx = platform.x + platform.w * 0.52;
            const sy = platform.y - 24 * state.scale;
            const dx = p.x - sx;
            const dy = p.y - sy;
            if (dx * dx + dy * dy < 900 * state.scale * state.scale) {
              platform.star = false;
              state.stars += 1;
              starsEl.textContent = state.stars;
              p.vy -= 1.9 * state.scale;
              burst(sx, sy, "#ffd45d", 18);
            }
          }
        }

        if (p.y < state.bestY) state.bestY = p.y;
        const targetCamera = Math.min(state.cameraY, p.y - state.height * 0.38);
        state.cameraY += (targetCamera - state.cameraY) * 0.12 * dt;
        state.score = Math.max(state.score, Math.floor((state.startY - state.bestY) / 10));
        scoreEl.textContent = state.score;

        ensurePlatforms();

        for (const petal of state.petals) {
          petal.a += 0.018 * dt;
          petal.x += Math.sin(petal.a) * 0.9 * dt;
          petal.y += petal.s * 0.018 * dt;
          if (screenY(petal.y) > state.height + 30) {
            petal.y = state.cameraY - rand(30, state.height);
            petal.x = rand(0, state.width);
          }
        }

        state.sparkles = state.sparkles.filter((s) => {
          s.life -= dt;
          s.x += s.vx * dt;
          s.y += s.vy * dt;
          s.vy += 0.08 * dt;
          return s.life > 0;
        });

        if (screenY(p.y - p.h) > state.height + 80) {
          state.running = false;
          state.over = true;
          overlay.querySelector("h1").textContent = "再跳一次";
          overlay.querySelector(".subtitle").textContent = `妃那到達 ${state.score} 米，收集 ${state.stars} 顆星星。`;
          startButton.textContent = "重新開始";
          overlay.classList.remove("hidden");
        }
      }

      function drawBackground() {
        const g = ctx.createLinearGradient(0, 0, 0, state.height);
        g.addColorStop(0, "#85c3f0");
        g.addColorStop(0.54, "#f9d1de");
        g.addColorStop(1, "#bde7cc");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, state.width, state.height);

        ctx.save();
        ctx.globalAlpha = 0.42;
        for (let i = 0; i < 7; i += 1) {
          const x = ((i * 121) % (state.width + 120)) - 60;
          const y = 78 + Math.sin(i * 1.8) * 22 + ((-state.cameraY * 0.08) % 120);
          ctx.fillStyle = "#fff7fb";
          ctx.beginPath();
          ctx.ellipse(x, y, 58, 18, 0, 0, Math.PI * 2);
          ctx.ellipse(x + 38, y + 4, 44, 14, 0, 0, Math.PI * 2);
          ctx.ellipse(x - 35, y + 6, 35, 12, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        drawTree(-36, state.height - 180, 1.05);
        drawTree(state.width - 72, state.height - 224, 0.92);
      }

      function drawTree(x, y, size) {
        const blossoms = [
          [18, 64, 27], [42, 31, 30], [74, 44, 33], [102, 72, 25], [12, 100, 22],
          [52, 91, 34], [90, 110, 25], [116, 37, 20], [28, 11, 19], [68, 6, 24],
          [108, 9, 21], [4, 42, 20], [38, 120, 19], [78, 82, 24], [116, 104, 18]
        ];
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(size, size);
        ctx.fillStyle = "rgba(119, 75, 64, 0.42)";
        ctx.fillRect(42, 74, 22, 146);
        ctx.fillStyle = "rgba(247, 151, 188, 0.42)";
        for (const blossom of blossoms) {
          ctx.beginPath();
          ctx.arc(blossom[0], blossom[1], blossom[2], 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawPlatform(platform) {
        const breakProgress = platform.breakTimer ? clamp(platform.breakTimer / 28, 0, 1) : 0;
        const shake = platform.breakTimer ? Math.sin(platform.breakTimer * 2.4) * 2 * state.scale : 0;
        const y = screenY(platform.y) + breakProgress * 18 * state.scale;
        if (y < -60 || y > state.height + 40) return;
        ctx.save();
        ctx.globalAlpha = 1 - breakProgress * 0.86;
        ctx.translate(shake, 0);
        const r = 9 * state.scale;
        ctx.fillStyle = platform.type === "spring" ? "#ffe36f" : platform.type === "cloud" ? "#fff7fb" : platform.type === "break" ? "#e7bdd7" : "#f8a8c2";
        ctx.strokeStyle = platform.type === "spring" ? "#c99129" : platform.type === "break" ? "#ffffff" : "#ffffff";
        ctx.lineWidth = 3;
        roundRect(platform.x, y, platform.w, platform.h, r);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = platform.type === "spring" ? "rgba(103,70,183,0.22)" : platform.type === "break" ? "rgba(128,83,147,0.18)" : "rgba(255,255,255,0.45)";
        roundRect(platform.x + 9, y + 3, platform.w - 18, 4, 2);
        ctx.fill();

        if (platform.type === "break") {
          ctx.strokeStyle = "rgba(115, 69, 132, 0.45)";
          ctx.lineWidth = 1.7 * state.scale;
          ctx.beginPath();
          ctx.moveTo(platform.x + platform.w * 0.36, y + 3 * state.scale);
          ctx.lineTo(platform.x + platform.w * 0.46, y + platform.h * 0.46);
          ctx.lineTo(platform.x + platform.w * 0.41, y + platform.h - 3 * state.scale);
          ctx.moveTo(platform.x + platform.w * 0.58, y + 3 * state.scale);
          ctx.lineTo(platform.x + platform.w * 0.53, y + platform.h * 0.58);
          ctx.lineTo(platform.x + platform.w * 0.68, y + platform.h - 2 * state.scale);
          ctx.stroke();
        }

        if (platform.type === "spring") {
          ctx.strokeStyle = "#7e58d6";
          ctx.lineWidth = 2;
          ctx.beginPath();
          for (let i = 0; i < 4; i += 1) {
            ctx.moveTo(platform.x + platform.w * 0.35 + i * 8, y - 2);
            ctx.lineTo(platform.x + platform.w * 0.39 + i * 8, y - 14);
          }
          ctx.stroke();
        }

        if (platform.star) drawStar(platform.x + platform.w * 0.52, y - 24 * state.scale, 9 * state.scale, "#ffd45d");
        ctx.restore();
      }

      function drawStar(x, y, r, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(performance.now() / 650);
        ctx.fillStyle = color;
        ctx.strokeStyle = "#fff7c4";
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < 10; i += 1) {
          const a = -Math.PI / 2 + i * Math.PI / 5;
          const rr = i % 2 ? r * 0.48 : r;
          ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawPlayer() {
        const p = state.player;
        const x = p.x;
        const y = screenY(p.y);
        const s = state.scale;
        const squash = p.squash * 0.08;

        if (finaStandCanvas) {
          drawFinaStandPlayer(x, y, p, s, squash);
          return;
        }

        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = "rgba(65, 38, 83, 0.18)";
        ctx.beginPath();
        ctx.ellipse(0, 43 * s, 34 * s, 8 * s, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawFinaStandPlayer(x, y, player, s, squash) {
        const bob = Math.sin(performance.now() / 130) * 0.8 * s;
        const drawH = 168 * s;
        const ratio = finaStandCanvas.width / finaStandCanvas.height;
        const drawW = drawH * ratio;

        ctx.save();
        ctx.translate(x, y + bob);
        ctx.scale(player.face || 1, 1);
        ctx.scale(1 + squash * 0.36, 1 - squash * 0.28);

        ctx.fillStyle = "rgba(65, 38, 83, 0.22)";
        ctx.beginPath();
        ctx.ellipse(0, 43 * s, 34 * s, 8 * s, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowColor = "rgba(68, 38, 95, 0.22)";
        ctx.shadowBlur = 8 * s;
        ctx.shadowOffsetY = 4 * s;
        ctx.drawImage(finaStandCanvas, -drawW / 2, -drawH * 0.88, drawW, drawH);
        ctx.shadowColor = "transparent";

        if (player.vy < -3 * s) {
          ctx.fillStyle = "rgba(255, 227, 111, 0.58)";
          drawStar(-24 * s, -84 * s, 4 * s, "#ffe36f");
          drawStar(26 * s, -78 * s, 3 * s, "#ffe36f");
        }

        ctx.restore();
      }

      function makeLightBackgroundTransparent(image) {
        const buffer = document.createElement("canvas");
        buffer.width = image.naturalWidth;
        buffer.height = image.naturalHeight;
        const bctx = buffer.getContext("2d");
        bctx.drawImage(image, 0, 0);
        const data = bctx.getImageData(0, 0, buffer.width, buffer.height);
        for (let i = 0; i < data.data.length; i += 4) {
          const r = data.data[i];
          const g = data.data[i + 1];
          const b = data.data[i + 2];
          const brightness = (r + g + b) / 3;
          if (brightness > 244 && Math.abs(r - g) < 12 && Math.abs(g - b) < 12) {
            data.data[i + 3] = 0;
          } else if (brightness > 232 && Math.abs(r - g) < 18 && Math.abs(g - b) < 18) {
            data.data[i + 3] = Math.min(data.data[i + 3], 80);
          }
        }
        bctx.putImageData(data, 0, 0);
        return buffer;
      }

      function drawEffects() {
        for (const petal of state.petals) {
          const y = screenY(petal.y);
          ctx.save();
          ctx.translate(petal.x, y);
          ctx.rotate(Math.sin(petal.a) * 0.9);
          ctx.fillStyle = "rgba(255, 244, 250, 0.82)";
          ctx.beginPath();
          ctx.ellipse(0, 0, petal.r, petal.r * 0.45, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        for (const s of state.sparkles) {
          const alpha = clamp(s.life / 28, 0, 1);
          ctx.globalAlpha = alpha;
          drawStar(s.x, screenY(s.y), s.size, s.color);
          ctx.globalAlpha = 1;
        }
      }

      function roundRect(x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + w, y, radius);
        ctx.closePath();
      }

      function render() {
        drawBackground();
        for (const platform of state.platforms) drawPlatform(platform);
        drawEffects();
        drawPlayer();
      }

      function frame(time) {
        const dt = clamp((time - state.lastTime) / 16.666, 0.5, 2);
        state.lastTime = time;
        if (state.running) update(dt);
        render();
        requestAnimationFrame(frame);
      }

      function handlePoint(clientX) {
        const rect = canvas.getBoundingClientRect();
        jump(clientX - rect.left < rect.width / 2 ? -1 : 1);
      }

      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        handlePoint(event.clientX);
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") jump(-1);
        if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") jump(1);
        if (event.key === " " || event.key === "Enter") {
          overlay.classList.add("hidden");
          resetGame();
        }
      });

      startButton.addEventListener("click", () => {
        overlay.classList.add("hidden");
        overlay.querySelector("h1").textContent = "妃那的櫻花跳躍";
        overlay.querySelector(".subtitle").textContent = "點左邊向左跳，點右邊向右跳。踩上櫻花台階，收集金色星星，越跳越高。";
        startButton.textContent = "開始冒險";
        resetGame();
      });

      window.addEventListener("resize", () => {
        const wasRunning = state.running;
        resize();
        if (!state.player) resetGame();
        state.running = wasRunning;
      });

      resize();
      resetGame();
      state.running = false;
      requestAnimationFrame((time) => {
        state.lastTime = time;
        requestAnimationFrame(frame);
      });
    })();
  </script>
</body>
</html>
